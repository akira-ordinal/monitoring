    <h2 class="lc__title">モニタリング</h2>
    <input type="password" id="btsm-pw" class="lc__input" placeholder="パスワード">
    <button id="btsm-login-btn" class="lc__btn">ログイン</button>
    <p id="btsm-error" class="lc__error"></p>
  </div>
</div>

<div id="btsm-root" style="display:none;">

  <div class="btsm-summary">
    <div class="btsm-sc">
      <div class="btsm-sc__label">監視銘柄数</div>
      <div class="btsm-sc__value" id="btsm-total">--</div>
      <div class="btsm-sc__sub">取得完了</div>
    </div>
    <div class="btsm-sc">
      <div class="btsm-sc__label">警告銘柄数</div>
      <div class="btsm-sc__value btsm-sc__value--alert" id="btsm-alerts">--</div>
      <div class="btsm-sc__sub" id="btsm-alerts-sub">しきい値超過</div>
    </div>
    <div class="btsm-sc">
      <div class="btsm-sc__label">最大スプレッド</div>
      <div class="btsm-sc__value btsm-sc__value--warn" id="btsm-max">--</div>
      <div class="btsm-sc__sub" id="btsm-max-coin">--</div>
    </div>
  </div>

  <div class="btsm-settings">
    <div class="btsm-group">
      <span class="btsm-label">警告しきい値</span>
      <input type="number" id="btsm-threshold" class="btsm-input" value="5" min="0.1" step="0.1">
      <span class="btsm-unit">%</span>
      <button id="btsm-apply" class="btsm-btn">適用</button>
    </div>
    <div class="btsm-divider"></div>
    <div class="btsm-group">
      <span class="btsm-label">表示順</span>
      <select id="btsm-sort" class="btsm-select">
        <option value="spread-desc" selected>スプレッド（大きい順）</option>
        <option value="spread-asc">スプレッド（小さい順）</option>
        <option value="name-asc">通貨名順</option>
      </select>
    </div>
    <span class="btsm-meta" id="btsm-updated">最終更新: --</span>
    <button id="btsm-logout-btn" class="btsm-btn btsm-btn--logout">ログアウト</button>
  </div>

 <div class="cl-table-wrap">
    <table class="cl-table">
      <thead class="cl-table__head">
        <tr>
          <th class="cl-th cl-th--coin">銘柄</th>
          <th class="cl-th cl-th--bid">Bid（買値）</th>
          <th class="cl-th cl-th--ask">Ask（売値）</th>
          <th class="cl-th cl-th--spread">スプレッド</th>
          <th class="cl-th cl-th--status">ステータス</th>
        </tr>
      </thead>
      <tbody id="btsm-tbody">
        <tr><td colspan="5" class="cl-loading">データ読み込み中...</td></tr>
      </tbody>
    </table>
    <div class="cl-footer" id="btsm-footer">60秒ごとに自動更新</div>
  </div>
</div>

    { s:'iost', name:'アイオーエストークン', dec:4, icon:'https://static.bittrade.co.jp/banner/20260311/02b5eff1a78e4b7da9753369969e366b' },
    { s:'xym', name:'シンボル', dec:2, icon:'https://static.bittrade.co.jp/banner/20260311/c4e8436c39a34cb1a2ed34b0c50adcfa' },
    { s:'bch', name:'ビットコインキャッシュ', dec:0, icon:'https://static.bittrade.co.jp/banner/20260309/dd06468178ec41948641a613c3d0dcfa' },
    { s:'xtz', name:'テゾス', dec:2, icon:'https://static.bittrade.co.jp/banner/20260311/92c073df62844856aa43199f359c19d9' },
    { s:'qtum', name:'クオンタム', dec:2, icon:'https://static.bittrade.co.jp/banner/20260309/afa597ab55d14e0296126855a093692f' },
    { s:'boba', name:'ボバネットワーク', dec:2, icon:'https://static.bittrade.co.jp/banner/20260311/94f524dfdd96458f997c8b0c01382c38' },
    { s:'bat', name:'ベーシックアテンショントークン', dec:2, icon:'https://static.bittrade.co.jp/banner/20260309/89e24fac1b2d457d9d6659620eb99092' },
    { s:'xlm', name:'ステラルーメン', dec:2, icon:'https://static.bittrade.co.jp/banner/20260309/83db16f4106f4ab7bd98ffe2131bc1bf' },
    { s:'ont', name:'オントロジー', dec:2, icon:'https://static.bittrade.co.jp/banner/20260309/f60493fab0744f63b6aa90555562bed5' }
  ];

  function fmtPrice(n, dec) {
    var d = typeof dec === 'number' ? dec : 2;
    return '\u00A5' + parseFloat(n).toLocaleString('ja-JP', {
      minimumFractionDigits: d, maximumFractionDigits: d
    });
  }
  function spreadMod(pct) {
    if (pct >= spreadThreshold) return 'alert';
    if (pct >= spreadThreshold * 0.8) return 'warn';
    return '';
  }
  function rowMod(pct) {
    if (pct >= spreadThreshold) return 'cl-row--alert';
    if (pct >= spreadThreshold * 0.8) return 'cl-row--warn';
    return '';
  }
  function statusHtml(pct) {
    if (pct >= spreadThreshold)
      return '<span class="cl-status cl-status--alert">\u8b66\u544a</span>';
    if (pct >= spreadThreshold * 0.8)
      return '<span class="cl-status cl-status--caution">\u6ce8\u610f</span>';
    return '<span class="cl-status cl-status--normal">\u6b63\u5e38</span>';
  }
  function coinRowHtml(r) {
    var abbr = r.coin.s.toUpperCase();
    var url = coinUrl(r.coin.s);
    var iconHtml =
      '<div class="cl-coin__icon">' +
        '<img src="' + r.coin.icon + '" alt="' + abbr + '" width="32" height="32" loading="lazy">' +
      '</div>';
    var infoHtml =
      '<div class="cl-coin__info">' +
        '<span class="cl-coin__name">' + r.coin.name + '</span>' +
        '<span class="cl-coin__symbol">' + abbr + '/JPY</span>' +
      '</div>';
    var coinLinkHtml =
      '<a class="cl-coin" href="' + url + '" target="_blank" rel="noopener noreferrer">' +
        iconHtml + infoHtml +
      '</a>';

    if (r.error) {
      return '<tr class="cl-row">' +
        '<td class="cl-td cl-td--coin">' + coinLinkHtml + '</td>' +
        '<td class="cl-td" colspan="4"><span class="cl-sub">\u30c7\u30fc\u30bf\u53d6\u5f97\u30a8\u30e9\u30fc</span></td>' +
      '</tr>';
    }

    var sc = r.spread.toFixed(2);
    var mod = spreadMod(r.spread);
    return '<tr class="cl-row ' + rowMod(r.spread) + '">' +
      '<td class="cl-td cl-td--coin">' + coinLinkHtml + '</td>' +
      '<td class="cl-td cl-td--bid"><span class="cl-price">' + fmtPrice(r.bid, r.coin.dec) + '</span></td>' +
      '<td class="cl-td cl-td--ask"><span class="cl-price">' + fmtPrice(r.ask, r.coin.dec) + '</span></td>' +
      '<td class="cl-td cl-td--spread"><span class="cl-spread' + (mod ? ' cl-spread--' + mod : '') + '">' + sc + '%</span></td>' +
      '<td class="cl-td cl-td--status">' + statusHtml(r.spread) + '</td>' +
    '</tr>';
  }

  async function fetchAll() {
    var tbody = document.getElementById('btsm-tbody');
    tbody.innerHTML = '<tr><td colspan="5" class="cl-loading">\u30c7\u30fc\u30bf\u8aad\u307f\u8fbc\u307f\u4e2d...</td></tr>';

    var results = [];
    for (var i = 0; i < COINS.length; i += 8) {
      var batch = COINS.slice(i, i + 8);
      await Promise.allSettled(batch.map(function(coin) {
        return fetch(API + '?symbol=' + coin.s + 'jpy', { cache: 'no-store' })
          .then(function(res) { return res.json(); })
          .then(function(data) {
            if (data.status !== 'ok' || !data.tick) throw new Error('no tick');
            var ask = data.tick.ask[0];
            var bid = data.tick.bid[0];
            var spread = ((ask - bid) / bid) * 100;
            results.push({ coin: coin, ask: ask, bid: bid, spread: spread, error: false });
          })
          .catch(function() {
            results.push({ coin: coin, error: true });
          });
      }));
    }

    results.sort(function(a, b) {
      if ( a.error && !b.error) return 1;
      if (!a.error &&  b.error) return -1;
      if ( a.error &&  b.error) return 0;
      if (sortOrder === 'spread-asc') return a.spread - b.spread;
      if (sortOrder === 'name-asc') return a.coin.name.localeCompare(b.coin.name, 'ja');
      return b.spread - a.spread;
    });

    var valid = results.filter(function(r) { return !r.error; });
    var alerted = valid.filter(function(r) { return r.spread >= spreadThreshold; });
    var maxItem = valid.reduce(function(m, r) { return (!m || r.spread > m.spread) ? r : m; }, null);

    document.getElementById('btsm-total').textContent = valid.length;
    document.getElementById('btsm-alerts').textContent = alerted.length;
    document.getElementById('btsm-alerts-sub').textContent =
      '\u3057\u304d\u3044\u5024 ' + spreadThreshold + '% \u8d85\u904e';
    document.getElementById('btsm-max').textContent = maxItem ? maxItem.spread.toFixed(2) + '%' : '--';
    document.getElementById('btsm-max-coin').textContent = maxItem
      ? maxItem.coin.s.toUpperCase() + ' / ' + maxItem.coin.name : '--';

    document.title = alerted.length > 0
      ? '(' + alerted.length + ') \u30b9\u30d7\u30ec\u30c3\u30c9\u76e3\u8996 | BitTrade'
      : '\u30b9\u30d7\u30ec\u30c3\u30c9\u76e3\u8996 | BitTrade';

    tbody.innerHTML = results.map(coinRowHtml).join('');

    var now = new Date();
    document.getElementById('btsm-updated').textContent =
      '\u6700\u7d42\u66f4\u65b0: ' + now.toLocaleString('ja-JP');
    document.getElementById('btsm-footer').textContent =
      valid.length + ' \u9298\u67c4\u53d6\u5f97\u5b8c\u4e86 \u2014 60\u79d2\u3054\u3068\u306b\u81ea\u52d5\u66f4\u65b0';
  }

  function login() {
    var pw = document.getElementById('btsm-pw').value;
    var err = document.getElementById('btsm-error');
    if (pw === PASSWORD) {
      document.getElementById('btsm-login').style.display = 'none';
      document.getElementById('btsm-root').style.display = 'block';
      fetchAll();
      intervalId = setInterval(fetchAll, 60000);
    } else {
      err.textContent = '\u30d1\u30b9\u30ef\u30fc\u30c9\u304c\u6b63\u3057\u304f\u3042\u308a\u307e\u305b\u3093';
    }
  }
  function logout() {
    clearInterval(intervalId);
    document.getElementById('btsm-root').style.display = 'none';
    document.getElementById('btsm-login').style.display = 'flex';
    document.getElementById('btsm-pw').value = '';
    document.getElementById('btsm-error').textContent = '';
  }

  document.getElementById('btsm-login-btn').addEventListener('click', login);
  document.getElementById('btsm-pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });
  document.getElementById('btsm-logout-btn').addEventListener('click', logout);
  document.getElementById('btsm-sort').addEventListener('change', function() {
    sortOrder = this.value;
    fetchAll();
  });
  document.getElementById('btsm-apply').addEventListener('click', function() {
    var val = parseFloat(document.getElementById('btsm-threshold').value);
    if (!isNaN(val) && val > 0) {
      spreadThreshold = val;
      fetchAll();
    } else {
      document.getElementById('btsm-threshold').value = spreadThreshold;
    }
  });
}());
</script>
